<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Happy Birthday Didi! 🎉</title>
  <meta name="description" content="A special birthday surprise for the most amazing Didi!" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;700&family=Outfit:wght@300;400;500;600;700&family=Pacifico&display=swap" rel="stylesheet">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎂</text></svg>" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ==================== ENTRANCE SCREEN ==================== -->
  <div id="entrance" class="entrance">
    <div class="entrance__content">
      <div class="entrance__emoji" id="entrance-emoji"></div>
      <h1 class="entrance__title" id="entrance-title"></h1>
      <p class="entrance__subtitle" id="entrance-subtitle"></p>
      <button id="enter-btn" class="entrance__btn"></button>
    </div>
  </div>

  <!-- ==================== CONFETTI CANVAS ==================== -->
  <canvas id="confetti-canvas"></canvas>

  <!-- ==================== MAIN WEBSITE ==================== -->
  <main id="main-site" class="main-site hidden">

    <!-- ===== HERO SECTION ===== -->
    <section id="hero" class="hero">
      <div class="hero__bg-shapes">
        <div class="hero__circle hero__circle--1"></div>
        <div class="hero__circle hero__circle--2"></div>
        <div class="hero__circle hero__circle--3"></div>
      </div>
      <div class="hero__content">
        <p class="hero__pre-title" id="hero-pre-title"></p>
        <h1 class="hero__title">
          <span class="hero__title-line" id="hero-line-1"></span>
          <span class="hero__title-line hero__title-line--accent" id="hero-line-2"></span>
          <span class="hero__title-line" id="hero-line-3"></span>
        </h1>
        <p class="hero__tagline" id="hero-tagline"></p>
        <div class="hero__scroll-hint">
          <span id="hero-scroll-text"></span>
          <div class="hero__scroll-arrow">↓</div>
        </div>
      </div>
    </section>

    <!-- ===== CAKE SECTION ===== -->
    <section id="cake-section" class="section cake-section">
      <h2 class="section__title" id="cake-title"></h2>
      <p class="section__subtitle" id="cake-subtitle"></p>
      <div class="cake-wrapper">
        <div class="cake" id="cake">
          <!-- Candles -->
          <div class="candles">
            <div class="candle" data-candle="1">
              <div class="flame-wrapper"><div class="flame"><div class="flame-inner"></div></div><div class="flame-glow"></div></div>
              <div class="candle-body"></div>
            </div>
            <div class="candle" data-candle="2">
              <div class="flame-wrapper"><div class="flame"><div class="flame-inner"></div></div><div class="flame-glow"></div></div>
              <div class="candle-body"></div>
            </div>
            <div class="candle" data-candle="3">
              <div class="flame-wrapper"><div class="flame"><div class="flame-inner"></div></div><div class="flame-glow"></div></div>
              <div class="candle-body"></div>
            </div>
            <div class="candle" data-candle="4">
              <div class="flame-wrapper"><div class="flame"><div class="flame-inner"></div></div><div class="flame-glow"></div></div>
              <div class="candle-body"></div>
            </div>
            <div class="candle" data-candle="5">
              <div class="flame-wrapper"><div class="flame"><div class="flame-inner"></div></div><div class="flame-glow"></div></div>
              <div class="candle-body"></div>
            </div>
          </div>
          <!-- Cake layers -->
          <div class="cake-top">
            <div class="cake-drip cake-drip--1"></div>
            <div class="cake-drip cake-drip--2"></div>
            <div class="cake-drip cake-drip--3"></div>
            <div class="cake-drip cake-drip--4"></div>
            <div class="cake-drip cake-drip--5"></div>
          </div>
          <div class="cake-layer cake-layer--1">
            <div class="cake-decoration">
              <span>🍓</span><span>🫐</span><span>🍓</span><span>🫐</span><span>🍓</span>
            </div>
          </div>
          <div class="cake-layer cake-layer--2">
            <div class="cake-decoration">
              <span>✨</span><span>💖</span><span>✨</span><span>💖</span><span>✨</span>
            </div>
          </div>
          <div class="cake-layer cake-layer--3">
            <div class="cake-decoration">
              <span>🌸</span><span>🦎</span><span>🌸</span><span>🦎</span><span>🌸</span>
            </div>
          </div>
          <div class="cake-plate"></div>
        </div>
        <p class="cake-message hidden" id="cake-wish-msg"></p>
      </div>
    </section>

    <!-- ===== BIRTHDAY CARD SECTION ===== -->
    <section id="card-section" class="section card-section">
      <h2 class="section__title" id="card-title"></h2>
      <p class="section__subtitle" id="card-subtitle"></p>
      <div class="card-container" id="card-container">
        <div class="birthday-card" id="birthday-card">
          <!-- FRONT (the cover) -->
          <div class="card-front" id="card-front">
            <div class="card-front__content">
              <div class="card-front__decoration" id="card-front-decoration"></div>
              <h3 id="card-front-heading"></h3>
              <p id="card-front-cta"></p>
              <div class="card-front__seal" id="card-front-seal"></div>
            </div>
          </div>
          <!-- INSIDE (always visible behind front) -->
          <div class="card-inside">
            <div class="card-inside__content" id="card-inside-content">
              <!-- Generated from messages.js -->
            </div>
          </div>
        </div>
      </div>
    </section>

    <!-- ===== MESSAGE WALL SECTION ===== -->
    <section id="message-wall" class="section message-wall-section">
      <h2 class="section__title" id="msgwall-title"></h2>
      <p class="section__subtitle" id="msgwall-subtitle"></p>
      <div class="message-grid" id="message-grid">
        <!-- Generated from messages.js -->
      </div>
    </section>

    <!-- ===== BALLOON POP GAME ===== -->
    <section id="balloon-section" class="section balloon-section">
      <h2 class="section__title" id="balloon-title"></h2>
      <p class="section__subtitle" id="balloon-subtitle"></p>
      <div class="balloon-game" id="balloon-game">
        <div class="balloon-area" id="balloon-area"></div>
        <button class="balloon-reset-btn" id="balloon-reset"></button>
      </div>
    </section>

    <!-- ===== SCRATCH CARD SECTION ===== -->
    <section id="scratch-section" class="section scratch-section">
      <h2 class="section__title" id="scratch-title"></h2>
      <p class="section__subtitle" id="scratch-subtitle"></p>
      <div class="scratch-container">
        <div class="scratch-card" id="scratch-card">
          <canvas id="scratch-canvas" width="320" height="200"></canvas>
          <div class="scratch-reveal" id="scratch-reveal">
            <p id="scratch-msg"></p>
            <p class="scratch-sub" id="scratch-sub-msg"></p>
          </div>
        </div>
        <button class="scratch-reset-btn" id="scratch-reset"></button>
      </div>
    </section>



    <!-- ===== TYPEWRITER SECTION ===== -->
    <section id="typewriter-section" class="section typewriter-section">
      <h2 class="section__title" id="typewriter-title"></h2>
      <div class="typewriter-container">
        <div class="letter-paper">
          <p class="letter-greeting" id="letter-greeting"></p>
          <p class="letter-body" id="typewriter-text"></p>
          <p class="letter-sign hidden" id="letter-sign"></p>
        </div>
      </div>
    </section>

    <!-- ===== CONFETTI BUTTON SECTION ===== -->
    <section id="confetti-section" class="section confetti-btn-section">
      <h2 class="section__title" id="confetti-title"></h2>
      <p class="section__subtitle" id="confetti-subtitle"></p>
      <button class="confetti-mega-btn" id="confetti-mega-btn"></button>
      <div class="party-counter">
        <span id="party-count">0</span> <span id="confetti-counter-suffix"></span>
      </div>
    </section>

    <!-- ===== FOOTER ===== -->
    <footer class="footer">
      <div class="footer__content">
        <p class="footer__text" id="footer-made"></p>
        <p class="footer__emoji-rain" id="footer-emoji"></p>
        <p class="footer__final" id="footer-final"></p>
      </div>
    </footer>

  </main>

  <script src="messages.js"></script>
  <script src="main.js"></script>
</body>
</html>
